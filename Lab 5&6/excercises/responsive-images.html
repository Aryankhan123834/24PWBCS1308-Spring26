<!DOCTYPE html>
<html>
<head>
<title>Responsive Images</title>
<style>
img{
max-width:100%;
height:auto;
}
</style>
</head>

<body>

<h1>Responsive Image Example</h1>

<img src="small.jpg"
srcset="small.jpg 480w,
medium.jpg 800w,
large.jpg 1200w"
sizes="(max-width:600px) 480px,
(max-width:900px) 800px,
1200px"
alt="Example Image">

</body>
</html>
