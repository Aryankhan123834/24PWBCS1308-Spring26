<!DOCTYPE html>
<html>

<head>

<title>Photo Gallery</title>

<style>

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
}

</style>

</head>

<body>

<h1>Photo Gallery</h1>

<div class="gallery">

<img src="/images/pic1.jpg">
<img src="/images/pic2.jpg">
<img src="/images/pic3.jpg">
<img src="/images/pic4.jpg">
<img src="/images/pic5.jpg">
>

</div>

</body>

</html>
