<!DOCTYPE html>
<html>

<head>

<title>Flexbox Form</title>

<style>

form{
display:flex;

gap:10px;
}

input{
flex:1;
padding:10px;
}

</style>

</head>

<body>

<h1>Responsive Form</h1>

<form>

<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<input type="submit">

</form>

</body>
</html>
