<!DOCTYPE html>
<html>

<head>

<title>Responsive Table</title>

<style>

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:10px;
}

@media(max-width:600px){

table,thead,tbody,tr,td{
display:block;
}

}

</style>

</head>

<body>

<h1>Responsive Table</h1>

<table>

<tr>
<th>Name</th>
<th>Price</th>
</tr>

<tr>
<td>Phone</td>
<td>$300</td>
</tr>

<tr>
<td>Laptop</td>
<td>$900</td>
</tr>

</table>

</body>
</html>
