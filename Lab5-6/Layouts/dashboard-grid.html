<!DOCTYPE html>
<html>

<head>
<title>Dashboard Layout</title>

<link rel="stylesheet" href="/24PWBCS1308-Spring26/Lab5-6/Styles/base.css">
<link rel="stylesheet" href="/24PWBCS1308-Spring26/Lab5-6/Styles/grid.css">

<style>

.dashboard{
display:grid;
grid-template-columns:200px 1fr 1fr 1fr;
grid-template-rows:70px auto auto;
gap:10px;
padding:20px;
}

.header{
grid-column:1 / 5;
background:#333;
color:white;
padding:20px;
text-align:center;
}

.sidebar{
grid-row:2 / 4;
background:#ddd;
padding:20px;
}

.card{
background:#eee;
padding:20px;
text-align:center;
}

.main{
grid-column:2 / 5;
background:#ccc;
padding:20px;
}

</style>

</head>

<body>

<div class="dashboard">

<div class="header">Admin Dashboard</div>

<div class="sidebar">
<p>Home</p>
<p>Users</p>
<p>Orders</p>
<p>Reports</p>
</div>

<div class="card">Users</div>
<div class="card">Orders</div>
<div class="card">Revenue</div>

<div class="card">Visitors</div>
<div class="card">Sales</div>
<div class="card">Messages</div>

<div class="main">Charts / Main Content</div>

</div>

</body>
</html>
