<!DOCTYPE html>
<html>

<head>
<title>Dark Mode Example</title>

<style>

body{
font-family:Arial;
background:white;
color:black;
text-align:center;
padding:40px;
}

/* Dark Mode */
@media (prefers-color-scheme: dark){

body{
background:black;
color:white;
}

}

</style>

</head>

<body>

<h1>Dark Mode Demo</h1>
<p>Change your system to dark mode to see the effect.</p>

</body>

</html>
